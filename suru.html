<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MSN Spinner</title>
<style>
  body {
    margin: 0;
    background: #0a0a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  .scene {
    perspective: 600px;
    width: 260px;
    height: 260px;
  }
  .spinner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: spin3d 3s linear infinite;
  }
  @keyframes spin3d {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  .spinner img {
    width: 260px;
    height: 260px;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 0 30px rgba(0, 140, 255, 0.8));
  }
  .glow-ring {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(0,140,255,0.5) 0%, transparent 70%);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) scaleX(1); }
    50%       { opacity: 1;   transform: translateX(-50%) scaleX(1.15); }
  }
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: -1;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50%       { opacity: var(--op); }
  }
</style>
</head>
